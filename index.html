<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Pernikahan</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  text-align: center;
  background: #f8f8f8;
}

.section {
  padding: 50px 20px;
}

.cover {
  height: 100vh;
  background: linear-gradient(to bottom, #000000aa, #000000aa),
              url('https://images.unsplash.com/photo-1520857014576-2c4f4c972b57');
  background-size: cover;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 40px;
}

.btn {
  padding: 12px 25px;
  background: gold;
  color: black;
  border: none;
  cursor: pointer;
  margin-top: 20px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<!-- COVER -->
<div class="cover">
  <h1>Rian & Siti</h1>
  <p>20 Desember 2026</p>
  <button class="btn" onclick="openInvite()">Buka Undangan</button>
</div>

<!-- ISI -->
<div id="content" class="hidden">

  <div class="section">
    <h2>Assalamu'alaikum</h2>
    <p>Dengan memohon rahmat Allah SWT, kami mengundang Anda ke pernikahan kami</p>
  </div>

  <div class="section">
    <h1>Rian & Siti</h1>
  </div>

  <div class="section">
    <h2>Detail Acara</h2>
    <p>Akad: 20 Desember 2026 - 09:00</p>
    <p>Resepsi: 20 Desember 2026 - 11:00</p>
  </div>

  <div class="section">
    <h2>Lokasi</h2>
    <iframe 
      src="https://maps.google.com/maps?q=jakarta&output=embed"
      width="90%" height="250">
    </iframe>
  </div>

  <div class="section">
    <h2>Countdown</h2>
    <p id="countdown"></p>
  </div>

</div>

<!-- MUSIK -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<script>
function openInvite() {
  document.getElementById("content").classList.remove("hidden");
  document.querySelector(".cover").style.display = "none";
  document.getElementById("music").play();
}

// COUNTDOWN
const target = new Date("Dec 20, 2026 09:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const diff = target - now;

  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff % (1000*60*60*24))/(1000*60*60));
  const m = Math.floor((diff % (1000*60*60))/(1000*60));

  document.getElementById("countdown").innerHTML =
    d + " hari " + h + " jam " + m + " menit";
}, 1000);
</script>

</body>
</html>
